name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Installer la bibliothèque ncurses
      run: sudo apt-get update && sudo apt-get install -y libncurses5-dev libncursesw5-dev

    - name: Compiler le jeu avec Make
      run: make
